version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qgen_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./backend/data/qdrant:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__LOG_LEVEL=INFO
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qgen_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    env_file:
      - ./backend/.env
    environment:
      - QGEN_DATA_DIR=/app/data
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant
    restart: unless-stopped

networks:
  default:
    name: qgen_network
